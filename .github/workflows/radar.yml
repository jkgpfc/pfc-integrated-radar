name: radar
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: radar-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4
      - name: Publish every 5 minutes for ~50 minutes
        run: |
          git config user.name 'pfc-nrd-bot'
          git config user.email 'pfc-nrd-bot@users.noreply.github.com'
          END=$((SECONDS+3000))
          while [ $SECONDS -lt $END ]; do
            node radar/server.js --once || true
            cp radar/data/data.json data.json || true
            git add data.json radar/data/store.json
            if ! git diff --cached --quiet; then
              git commit -m "NRD auto-publish $(TZ=Asia/Kolkata date '+%F %H:%M') [skip ci]"
              git pull --rebase --autostash origin main || true
              git push || true
            fi
            sleep 240
          done
