name: radar
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: radar-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Run PFC-NRD engine once
        run: node radar/server.js --once
      - name: Stage data.json
        run: cp radar/data/data.json data.json
      - name: Commit and push if changed
        run: |
          git config user.name 'pfc-nrd-bot'
          git config user.email 'pfc-nrd-bot@users.noreply.github.com'
          git add data.json radar/data/store.json
          if git diff --cached --quiet; then echo 'no change'; else
            git commit -m "NRD auto-publish $(TZ=Asia/Kolkata date '+%F %H:%M') [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
