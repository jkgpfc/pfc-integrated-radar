name: radar
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: radar-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Fetch, classify and publish once
        run: |
          git config user.name 'pfc-nrd-bot'
          git config user.email 'pfc-nrd-bot@users.noreply.github.com'
          node radar/server.js --once || true
          cp radar/data/data.json data.json || true
          git add data.json radar/data/store.json
          if ! git diff --cached --quiet; then
            git commit -m "NRD auto-publish $(TZ=Asia/Kolkata date '+%F %H:%M') [skip ci]" || true
          fi
          git pull --rebase --autostash origin main || git rebase --abort || true
          git push || true
